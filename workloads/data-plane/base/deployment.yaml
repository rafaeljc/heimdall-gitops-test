apiVersion: apps/v1
kind: Deployment
metadata:
  name: heimdall-data-plane
  labels:
    app.kubernetes.io/name: heimdall-data-plane
    app.kubernetes.io/component: data-plane
    app.kubernetes.io/part-of: heimdall
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: heimdall-data-plane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: heimdall-data-plane
        app.kubernetes.io/component: data-plane
    spec:
      # Extended grace period (60s) for gRPC: allows long-lived HTTP/2 streams to drain gracefully during scaling/rollouts
      terminationGracePeriodSeconds: 60
      containers:
        - name: data-plane
          image: heimdall-data-plane:latest
          imagePullPolicy: Always
          ports:
            # Main gRPC port for high-performance flag evaluation
            - name: grpc
              containerPort: 50051
              protocol: TCP
            # Observability port (Metrics and Health Checks)
            - name: metrics
              containerPort: 9090
              protocol: TCP
          
          # Health checks strictly bound to the observability port to avoid API starvation during spikes
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          
          # Zero-trust security context: Principle of least privilege
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 3000
            capabilities:
              drop:
                - ALL
