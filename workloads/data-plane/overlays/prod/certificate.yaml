apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: heimdall-data-plane-tls
  labels:
    app.kubernetes.io/name: heimdall-data-plane
    app.kubernetes.io/component: data-plane
    app.kubernetes.io/part-of: heimdall
spec:
  secretName: heimdall-data-plane-tls-secret
  duration: 2160h
  renewBefore: 360h
  isCA: false
  privateKey:
    # Crucial for Data Plane: ECDSA reduces CPU usage during high-volume gRPC connection establishment
    algorithm: ECDSA
    size: 256
  dnsNames:
    - heimdall-data-plane.heimdall-prod.svc
    - heimdall-data-plane.heimdall-prod.svc.cluster.local
  issuerRef:
    name: system-internal-issuer
    kind: ClusterIssuer
