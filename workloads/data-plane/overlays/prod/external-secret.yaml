apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: heimdall-credentials
  labels:
    app.kubernetes.io/name: heimdall-data-plane
    app.kubernetes.io/component: data-plane
    app.kubernetes.io/part-of: heimdall
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: heimdall-secrets-native
    creationPolicy: Owner
  data:
    - secretKey: HEIMDALL_REDIS_URL
      remoteRef:
        key: heimdall/prod/redis
        property: url
    - secretKey: HEIMDALL_SERVER_DATA_API_KEY_HASH
      remoteRef:
        key: heimdall/prod/api-keys
        property: data_plane_hash
