# Data Plane Public Service
# Exposes the Heimdall Data Plane gRPC API externally via AWS Network Load Balancer.
# This service creates a public-facing endpoint for SDKs and client applications to evaluate flags.
#
# Naming Convention: The "-public" suffix distinguishes this from the internal ClusterIP service.
# Load Balancer Type: AWS NLB with IP target type for efficient L4 routing.
# Port Strategy: Exposes only port 443 (gRPC over TLS), keeping metrics endpoints (9090) internal.
# Protocol: gRPC with mandatory TLS encryption for data-plane security.
# Dependencies: Requires AWS Load Balancer Controller to create the underlying AWS resources.

apiVersion: v1
kind: Service
metadata:
  name: heimdall-data-plane-public
  annotations:
    # AWS Load Balancer Controller directives for NLB creation
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  type: LoadBalancer
  # Routes traffic to data-plane pods
  selector:
    app.kubernetes.io/name: heimdall-data-plane
  # Port Configuration: Explicitly exposes only the gRPC port, restricting metrics access
  ports:
    - name: grpc-tls
      port: 443
      targetPort: grpc
      protocol: TCP
      # Signals NLB to use gRPC protocol awareness (HTTP/2 optimization)
      appProtocol: grpc
