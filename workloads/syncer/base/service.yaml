apiVersion: v1
kind: Service
metadata:
  name: heimdall-syncer
  labels:
    app.kubernetes.io/name: heimdall-syncer
    app.kubernetes.io/component: syncer
    app.kubernetes.io/part-of: heimdall
spec:
  # Internal service used strictly by Prometheus to discover and scrape metrics from the worker fleet
  type: ClusterIP
  selector:
    app.kubernetes.io/name: heimdall-syncer
  ports:
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
      appProtocol: http
