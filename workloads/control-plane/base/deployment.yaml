apiVersion: apps/v1
kind: Deployment
metadata:
  name: heimdall-control-plane
  labels:
    app.kubernetes.io/name: heimdall-control-plane
    app.kubernetes.io/component: control-plane
    app.kubernetes.io/part-of: heimdall
spec:
  # Omit replicas here to allow HPA or Overlay to control scaling
  selector:
    matchLabels:
      app.kubernetes.io/name: heimdall-control-plane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: heimdall-control-plane
        app.kubernetes.io/component: control-plane
    spec:
      # Graceful shutdown configuration
      terminationGracePeriodSeconds: 30
      containers:
        - name: control-plane
          image: heimdall-control-plane:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          
          # Health checks isolated on the observability port to prevent API starvation
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          
          # Zero-trust security context: Principle of least privilege
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 3000
            capabilities:
              drop:
                - ALL
