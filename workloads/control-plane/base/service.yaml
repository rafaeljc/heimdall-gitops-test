apiVersion: v1
kind: Service
metadata:
  name: heimdall-control-plane
  labels:
    app.kubernetes.io/name: heimdall-control-plane
    app.kubernetes.io/component: control-plane
    app.kubernetes.io/part-of: heimdall
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: heimdall-control-plane
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
