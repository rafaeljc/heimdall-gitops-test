apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  labels:
    app.kubernetes.io/part-of: platform-system
    security.heimdall.io/compliance: zero-trust
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1 # Ensure this matches your AWS deployment region
      # Authentication is implicitly and securely handled by the EKS Pod Identity Agent.
      # No IRSA, OIDC providers, or static credentials are required.
