apiVersion: apps/v1
kind: Deployment
metadata:
  name: heimdall-control-plane
spec:
  # Minimum baseline for High Availability
  replicas: 2
  template:
    spec:
      # Anti-affinity: Ensures pods are distributed across different physical nodes/AZs
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: heimdall-control-plane
      containers:
        - name: control-plane
          # Mount the certificate files into the container's filesystem
          volumeMounts:
            - name: tls-certs
              mountPath: /etc/heimdall/certs
              readOnly: true
          # Strict hardware limits to prevent Noisy Neighbor issues and OOM kills
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          envFrom:
            - configMapRef:
                name: heimdall-control-plane-config
            - secretRef:
                name: heimdall-secrets-native
      # Define the volume using the Secret generated by cert-manager
      volumes:
        - name: tls-certs
          secret:
            secretName: heimdall-control-plane-tls-secret
            defaultMode: 0400